name: Smoke tests

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-tests:
    runs-on: macos-26
    steps:
      - name: Setup build environment
        uses: msfjarvis/compose-lobsters/.github/reusable-workflows/setup-gradle@92aae743ab8e1c98741128f1bfda3715750f5cf6 # main
        with:
          fetch-depth: 0
          cache-read-only: true

      - name: Run smoke probe
        run: build-brief ./gradlew --no-configuration-cache --stacktrace :smoke-tests:run
